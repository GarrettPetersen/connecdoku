name = "connecdoku-terminal-api"
main = "terminal_api_worker.js"
compatibility_date = "2026-05-18"
workers_dev = false

[[routes]]
pattern = "connecdoku.com/api/*"
zone_name = "connecdoku.com"

# Optional alternative to use a dedicated API subdomain:
# [[routes]]
# pattern = "api.connecdoku.com"
# custom_domain = true

[vars]
TERMINAL_API_STATE_TTL_SECONDS = "3600"
TERMINAL_API_MAX_STATE_TTL_SECONDS = "86400"
TERMINAL_API_DISABLE_FUTURE = "1"

[[d1_databases]]
binding = "DB"
database_name = "connecdoku-terminal"
database_id = "676e8114-f350-438d-80c7-0c5271289ad4"
preview_database_id = "676e8114-f350-438d-80c7-0c5271289ad4"
migrations_dir = "migrations"
